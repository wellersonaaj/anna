# Dockerfile na raiz: Railway deixa de usar Railpack para instalar deps.
# O Railpack monta cache em paths como apps/web/node_modules/.vite; o npm ci
# não consegue apagar (EBUSY). Ver https://railpack.com/config/file/ (Caches).
#
# Se o serviço ainda usar Railpack, apague o Build Command manual no painel
# e use só este arquivo, ou defina Root Directory na raiz do repo.
#
# Watch paths: lista explícita + **/* (gitignore-style). Se ainda vires
# "watched paths not modified" no check do GitHub, no Railway abre o serviço
# → Settings → Build → apaga os "Watch Paths" guardados no UI e volta a guardar.
[build]
dockerfilePath = "Dockerfile"
watchPatterns = [
  "**/*",
  "apps/**",
  "packages/**",
  "prisma/**",
  "Dockerfile",
  ".dockerignore",
  "railway.toml",
  "package.json",
  "package-lock.json",
  ".github/**",
]

[deploy]
preDeployCommand = ["npx prisma migrate deploy"]
startCommand = "node apps/api/dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 60
