# CI em cada push/PR para main — necessário se o Railway (ou outro) tiver
# "Wait for CI" / deploy condicionado a checks do GitHub.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build API (Prisma + shared + api)
        run: npm run build:api

      - name: Build web
        run: npm run build -w @anna/web

      - name: Lint
        run: npm run lint --workspaces --if-present
