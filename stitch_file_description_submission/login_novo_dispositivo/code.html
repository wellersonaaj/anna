<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Agente - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Manrope:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-low": "#fff0f0",
                        "on-secondary-fixed-variant": "#7f2736",
                        "on-tertiary-fixed": "#00210e",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-highest": "#f8dcdd",
                        "on-tertiary": "#ffffff",
                        "background": "#fff8f7",
                        "tertiary-container": "#008649",
                        "secondary-fixed-dim": "#ffb2b8",
                        "error": "#ba1a1a",
                        "on-primary": "#ffffff",
                        "on-secondary-container": "#75202f",
                        "inverse-primary": "#ffb2b8",
                        "primary-fixed-dim": "#ffb2b8",
                        "surface-bright": "#fff8f7",
                        "primary-fixed": "#ffdadb",
                        "surface-container-high": "#fee1e3",
                        "on-primary-fixed-variant": "#91002d",
                        "tertiary-fixed-dim": "#5bde8d",
                        "on-surface": "#271819",
                        "on-secondary-fixed": "#40000f",
                        "tertiary": "#006a39",
                        "tertiary-fixed": "#7afca7",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "surface-variant": "#f8dcdd",
                        "on-error": "#ffffff",
                        "on-tertiary-fixed-variant": "#00522a",
                        "secondary-container": "#fd8895",
                        "surface-dim": "#efd3d5",
                        "on-primary-container": "#fffbff",
                        "on-primary-fixed": "#40000f",
                        "on-background": "#271819",
                        "outline": "#8e6f71",
                        "inverse-on-surface": "#ffeced",
                        "error-container": "#ffdad6",
                        "secondary": "#9e3e4c",
                        "primary": "#b60e3d",
                        "primary-container": "#da3054",
                        "surface-container": "#ffe9e9",
                        "inverse-surface": "#3d2c2d",
                        "secondary-fixed": "#ffdadb",
                        "outline-variant": "#e2bec0",
                        "on-surface-variant": "#5a4042",
                        "surface-tint": "#ba1340",
                        "surface": "#fff8f7",
                        "on-tertiary-container": "#f6fff4"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1.5rem",
                        "3xl": "2.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            background: rgba(255, 248, 247, 0.8);
            backdrop-filter: blur(12px);
        }
        .editorial-shadow {
            box-shadow: 0 12px 40px rgba(186, 19, 64, 0.06);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background font-body text-on-surface min-h-screen flex flex-col items-center selection:bg-primary-fixed">
<!-- Hero / Brand Section -->
<header class="w-full max-w-md pt-20 pb-12 px-8 flex flex-col items-center">
<!-- Logo Branding -->
<div class="mb-12">
<span class="font-headline font-extrabold text-3xl tracking-tighter text-on-surface">Agente</span>
</div>
<!-- Editorial Headlines -->
<div class="text-center space-y-2">
<h1 class="font-headline font-bold text-[2.5rem] leading-tight tracking-tight text-on-surface">
                Bora vender?
            </h1>
<p class="font-label text-sm uppercase tracking-[0.1em] text-secondary font-bold">
                Feito para brechó
            </p>
</div>
</header>
<!-- Interactive Canvas -->
<main class="w-full max-w-md px-8 flex-grow">
<div class="bg-surface-container-lowest rounded-3xl p-8 editorial-shadow space-y-8">
<!-- Phone Input Component -->
<div class="space-y-4">
<label class="font-label text-xs font-bold text-on-surface-variant uppercase tracking-widest px-1" for="phone">
                    Celular
                </label>
<div class="relative group">
<div class="absolute left-0 bottom-0 w-full h-[2px] bg-outline-variant transition-all duration-300 group-focus-within:bg-primary"></div>
<div class="flex items-center space-x-3 py-3">
<span class="font-headline font-semibold text-xl text-primary">+55</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-xl font-headline font-medium placeholder:text-outline-variant/60 text-on-surface" id="phone" name="phone" placeholder="(00) 00000-0000" type="tel"/>
</div>
</div>
</div>
<!-- Primary Action -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold text-lg py-5 rounded-2xl editorial-shadow active:scale-[0.98] transition-transform flex items-center justify-center space-x-3 group">
<span>Receber código no WhatsApp</span>
<span class="material-symbols-outlined text-2xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Decorative Visual Context (Asymmetric Editorial Style) -->
</div>
</main>
<!-- Minimal Footer -->
<footer class="w-full max-w-md px-8 py-10 flex justify-center">
<button class="font-label text-[11px] uppercase tracking-[0.12em] font-bold text-on-surface-variant/50 hover:text-primary transition-colors py-2 px-4">
            Solicitar Acesso
        </button>
</footer>
<!-- Glassmorphism Floating Decoration (Subtle Brand Identity) -->
<div class="fixed -bottom-20 -left-20 w-64 h-64 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed -top-20 -right-20 w-64 h-64 bg-secondary-container/10 rounded-full blur-[100px] pointer-events-none"></div>
</body></html>
