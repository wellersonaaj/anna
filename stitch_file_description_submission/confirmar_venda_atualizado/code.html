<!DOCTYPE html>

<html class="light" lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Confirmar Venda - Archive</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-background": "#271819",
                    "on-tertiary-container": "#f6fff4",
                    "surface-dim": "#efd3d5",
                    "primary-fixed": "#ffdadb",
                    "on-surface": "#271819",
                    "on-primary-fixed-variant": "#91002d",
                    "on-error": "#ffffff",
                    "secondary-container": "#fd8895",
                    "background": "#fff8f7",
                    "primary-container": "#da3054",
                    "outline-variant": "#e2bec0",
                    "secondary-fixed-dim": "#ffb2b8",
                    "primary-fixed-dim": "#ffb2b8",
                    "surface-container-high": "#fee1e3",
                    "tertiary-fixed-dim": "#5bde8d",
                    "on-tertiary": "#ffffff",
                    "on-primary-container": "#fffbff",
                    "on-error-container": "#93000a",
                    "on-secondary-fixed-variant": "#7f2736",
                    "inverse-primary": "#ffb2b8",
                    "error": "#ba1a1a",
                    "inverse-on-surface": "#ffeced",
                    "outline": "#8e6f71",
                    "on-primary": "#ffffff",
                    "secondary": "#9e3e4c",
                    "inverse-surface": "#3d2c2d",
                    "surface-container": "#ffe9e9",
                    "on-surface-variant": "#5a4042",
                    "on-secondary": "#ffffff",
                    "surface-container-low": "#fff0f0",
                    "tertiary-fixed": "#7afca7",
                    "on-tertiary-fixed-variant": "#00522a",
                    "on-secondary-fixed": "#40000f",
                    "on-secondary-container": "#75202f",
                    "primary": "#b60e3d",
                    "surface": "#fff8f7",
                    "tertiary-container": "#008649",
                    "surface-variant": "#f8dcdd",
                    "tertiary": "#006a39",
                    "secondary-fixed": "#ffdadb",
                    "error-container": "#ffdad6",
                    "surface-bright": "#fff8f7",
                    "on-tertiary-fixed": "#00210e",
                    "surface-container-lowest": "#ffffff",
                    "surface-container-highest": "#f8dcdd",
                    "surface-tint": "#ba1340",
                    "on-primary-fixed": "#40000f"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .editorial-shadow {
            box-shadow: 0 12px 40px rgba(186, 19, 64, 0.06);
        }
        body {
          min-height: 100dvh;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-[#fff8f7]/80 backdrop-blur-md flex justify-between items-center px-6 h-16">
<div class="flex items-center gap-4">
<button class="active:scale-95 duration-200 text-[#271819]/60 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-xl font-bold text-[#271819] font-['Plus_Jakarta_Sans'] tracking-tight">Confirmar Venda</h1>
</div>
<div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden">
<img alt="Perfil do usuário" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBaab5emKEOVF84j-OThuRsvFZ9ntCVYx9UIPOvxO5B3cmkbRIIawwJCZZe0ZGKotrIKkHP5pNTeO-utOsOoKP-Zp6VODEvD9C88pV6QbKAD4RWLb_e8tqY3wVby_gfM5E5Qg6L0tV__RqYCZStqkLBFbcEuWjnATdGc-fm5zn8Voz8OQzByS0lY3JfIcTsoKLYFV_33Wwp8gvQOg62E2PVv-Yeo7jdE2kr8FvhePzJDvdyRt75eVBG_BnNCimTr4fw9eV8K-PLig"/>
</div>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto pb-12">
<!-- Editorial Hero Header -->
<section class="mb-10">
<span class="text-[10px] uppercase tracking-[0.1em] font-bold text-primary mb-2 block font-label">Resumo da venda</span>
<h2 class="text-[3.5rem] leading-none font-headline font-extrabold tracking-tighter text-on-background">Confirmar Venda</h2>
</section>
<!-- Product Summary Card -->
<section class="bg-surface-container-lowest rounded-[2rem] p-6 mb-8 editorial-shadow flex flex-col md:flex-row gap-6">
<div class="w-full md:w-32 h-32 shrink-0 bg-surface-container-low rounded-xl overflow-hidden relative group">
<img alt="Imagem do Produto" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBKawjQN10hCBuXrSk-Vk5Lw0uxUALkLxTo-KhF3Kb0uF8zcK-sC1hmrNdi28a_wWe8GfNVGdsJNCXATzd3EI-hhPV2Wa7QMytx1oLQHR_R40wNmSVb81ehtPMSRViVWrSHHDEtJL290YgJGlZpUY24b5CTC2GK9xw0N0kB8bZKGnEZGHDXwsGbfTWmILEfc2_9NUYMBeKCn6GwbibEugZ87mQ8o6dEvWNHrdBzJTGTVfUM-vsoZ9XS558OgOjMFy_H3DDyc6utZA"/>
<div class="absolute inset-0 ring-1 ring-inset ring-primary/10 rounded-xl"></div>
</div>
<div class="flex flex-col justify-center space-y-2">
<h3 class="text-2xl font-headline font-bold text-on-background">Sneakers de Couro Vintage</h3>
</div>
</section>
<!-- Form Section -->
<div class="space-y-12">
<!-- Selling Price Field -->
<div class="relative group">
<label class="block text-[10px] uppercase tracking-[0.1em] font-bold text-on-surface-variant mb-2 font-label" for="price">Preço Final de Venda</label>
<div class="flex items-baseline border-b-2 border-outline-variant group-focus-within:border-primary transition-colors pb-2">
<span class="text-2xl font-headline font-bold text-on-background mr-2">R$</span>
<input class="w-full bg-transparent border-none p-0 text-[3.5rem] font-headline font-extrabold tracking-tighter text-on-background focus:ring-0 placeholder-surface-dim" id="price" type="text" value="450,00"/>
</div>
<p class="mt-2 text-xs text-on-surface-variant italic">Pré-preenchido com o preço de anúncio. Toque para editar.</p>
</div>
<!-- Shipping Field -->
<div class="relative group">
<label class="block text-[10px] uppercase tracking-[0.1em] font-bold text-on-surface-variant mb-2 font-label" for="shipping">Informações de Envio</label>
<div class="flex items-center border-b-2 border-outline-variant group-focus-within:border-primary transition-colors pb-2">
<span class="material-symbols-outlined text-primary mr-4">local_shipping</span>
<input class="w-full bg-transparent border-none p-0 text-xl font-headline font-bold text-on-background focus:ring-0" id="shipping" placeholder="ex: Correios R$15" type="text" value="Correios R$15"/>
</div>
</div>
<!-- Totals -->
<div class="bg-surface-container-low rounded-[2rem] p-8 space-y-4">
<div class="flex justify-between items-center">
<span class="text-on-surface-variant font-medium">Subtotal</span>
<span class="font-bold">R$ 450,00</span>
</div>
<div class="flex justify-between items-center">
<span class="text-on-surface-variant font-medium">Frete</span>
<span class="font-bold text-error">- R$ 15,00</span>
</div>
<div class="pt-4 mt-4 border-t border-outline-variant/20 flex justify-between items-center">
<span class="text-lg font-headline font-bold">Ganhos Totais</span>
<span class="text-3xl font-headline font-extrabold text-primary tracking-tight">R$ 435,00</span>
</div>
</div>
</div>
<!-- Action Button Container -->
<div class="mt-16 mb-12">
<button class="w-full h-16 bg-[#FF4D6D] rounded-xl flex items-center justify-center gap-3 active:scale-[0.98] transition-transform shadow-[0_12px_40px_rgba(255,77,109,0.25)] group">
<span class="text-white text-lg font-headline font-extrabold tracking-tight">Confirmar Venda</span>
<span class="material-symbols-outlined text-white group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<p class="text-center mt-6 text-on-surface-variant text-sm font-medium">Ao confirmar, o status do item será movido para <span class="text-primary font-bold">Vendido</span> no seu estoque.</p>
</div>
</main>
</body></html>
